<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D6FF"/>
      <stop offset="55%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0B132B"/>
    </radialGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="170"
          fill="none"
          stroke="#0B132B"
          stroke-width="34"
          stroke-linecap="round"
          stroke-dasharray="480 80"
          transform="rotate(-90 256 256)"/>

  <!-- Breaks to imply openness -->
  <rect x="240" y="48" width="32" height="72" fill="white"/>
  <rect x="240" y="392" width="32" height="72" fill="white"/>

  <!-- Center -->
  <circle cx="256" cy="256" r="34" fill="url(#g)"/>
</svg>
